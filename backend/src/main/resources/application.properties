# PayMedia CRM - Spring Boot Configuration
# Application Properties

# Server Configuration
server.port=8080

# Application Name
spring.application.name=PayMedia-CRM

# H2 In-Memory Database Configuration (NO MySQL INSTALLATION NEEDED!)
spring.datasource.url=jdbc:h2:mem:paymedia_crm
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (Web UI for Database - Access at: http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.format_sql=true

# Initialize database with sample data
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# Logging Configuration
logging.level.org.springframework.web=INFO
logging.level.com.paymedia.crm=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Jackson Configuration (for JSON serialization)
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=UTC
